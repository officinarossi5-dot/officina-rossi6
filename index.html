<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Officina Rossi</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root { --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --blue:#4488ff; --green:#00cc66; --red:#ff4444; --orange:#ff9900; --text:#c9d1d9; --text2:#8b949e; --white:#ffffff; --border:#30363d; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding-bottom:80px; }
.header { background:var(--bg2); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header-title { font-size:16px; font-weight:700; color:var(--white); }
.header-sub { font-size:11px; color:var(--blue); margin-top:1px; }
.sync-btn { background:none; border:1px solid var(--border); border-radius:8px; color:var(--text2); padding:7px 12px; font-size:13px; cursor:pointer; }
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--border); display:flex; z-index:100; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 4px 14px; cursor:pointer; border:none; background:none; color:var(--text2); font-size:10px; gap:4px; }
.nav-btn.active { color:var(--blue); }
.nav-icon { font-size:20px; }
.page { display:none; padding:16px; }
.page.active { display:block; }
.kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.kpi-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:14px; text-align:center; }
.kpi-value { font-size:28px; font-weight:700; color:var(--white); }
.kpi-label { font-size:11px; color:var(--text2); margin-top:4px; }
.kpi-card.green .kpi-value { color:var(--green); } .kpi-card.green { border-color:#00cc6633; }
.kpi-card.red .kpi-value { color:var(--red); } .kpi-card.red { border-color:#ff444433; }
.kpi-card.orange .kpi-value { color:var(--orange); } .kpi-card.orange { border-color:#ff990033; }
.kpi-card.blue .kpi-value { color:var(--blue); } .kpi-card.blue { border-color:#4488ff33; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
.card-title { font-size:11px; letter-spacing:2px; color:var(--blue); margin-bottom:12px; font-weight:600; text-transform:uppercase; }
.ordine-item { background:var(--bg3); border-radius:10px; padding:14px; margin-bottom:8px; }
.ordine-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.ordine-cliente { font-size:15px; font-weight:600; color:var(--white); }
.ordine-rif { font-size:12px; color:var(--text2); margin-top:2px; }
.badge { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; white-space:nowrap; }
.badge.green { background:#00cc6622; color:var(--green); }
.badge.red { background:#ff444422; color:var(--red); }
.badge.orange { background:#ff990022; color:var(--orange); }
.badge.blue { background:#4488ff22; color:var(--blue); }
.fasi-list { margin-top:10px; display:flex; flex-direction:column; gap:6px; }
.fase-item { background:var(--bg); border-radius:8px; padding:8px 12px; }
.fase-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.fase-nome { font-size:12px; font-weight:600; color:var(--text); }
.fase-qty { font-size:11px; color:var(--text2); }
.progress-bar { background:var(--bg2); border-radius:4px; height:5px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; background:var(--blue); transition:width 0.3s; }
.progress-fill.green { background:var(--green); }
.progress-fill.red { background:var(--red); }
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.section-title { font-size:13px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:1px; }
.add-btn { background:var(--blue); border:none; color:var(--white); border-radius:8px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; }
.modal-overlay { display:none; position:fixed; inset:0; background:#000000dd; z-index:200; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border-radius:20px 20px 0 0; padding:20px 16px 40px; width:100%; max-height:92vh; overflow-y:auto; }
.modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 18px; }
.modal-title { font-size:18px; font-weight:700; color:var(--white); margin-bottom:20px; }
.form-group { margin-bottom:14px; }
.form-label { font-size:12px; color:var(--text2); margin-bottom:7px; display:block; font-weight:500; }
.form-input,.form-select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--white); font-size:16px; padding:12px 14px; outline:none; font-family:inherit; transition:border-color 0.2s; }
.form-input:focus,.form-select:focus { border-color:var(--blue); }
.form-select option { background:var(--bg2); }
.btn { width:100%; padding:15px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:6px; }
.btn-primary { background:var(--blue); color:var(--white); }
.btn-success { background:var(--green); color:#000; }
.btn-danger { background:var(--red); color:var(--white); }
.btn-outline { background:none; border:1px solid var(--border); color:var(--text); }
.alert { border-radius:10px; padding:12px 14px; margin-bottom:12px; font-size:13px; }
.alert.success { background:#00cc6622; color:var(--green); border:1px solid #00cc6633; }
.alert.error { background:#ff444422; color:var(--red); border:1px solid #ff444433; }
.empty { text-align:center; padding:48px 16px; color:var(--text2); }
.empty-icon { font-size:48px; margin-bottom:12px; }
.date-label { text-align:center; font-size:12px; color:var(--text2); margin-bottom:16px; }
.spinner { display:inline-block; width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-state { text-align:center; padding:40px; }
/* FASI FORM */
.fase-form-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.fase-form-row .form-input { flex:2; }
.fase-form-row .form-input.qty { flex:1; }
.fase-form-row .btn-remove-fase { background:none; border:1px solid #ff444433; border-radius:8px; color:var(--red); cursor:pointer; padding:10px 12px; font-size:16px; flex-shrink:0; }
.btn-add-fase { width:100%; background:#4488ff11; border:1px dashed #4488ff44; border-radius:8px; color:var(--blue); cursor:pointer; padding:10px; font-size:13px; font-family:inherit; margin-bottom:14px; }
/* TIMER */
.timer-box { background:var(--bg3); border-radius:12px; padding:16px; margin-bottom:14px; text-align:center; }
.timer-display { font-size:40px; font-weight:700; color:var(--white); font-variant-numeric:tabular-nums; letter-spacing:2px; margin:8px 0; }
.timer-label { font-size:11px; color:var(--text2); margin-bottom:12px; }
.timer-btns { display:flex; gap:8px; }
.timer-btn { flex:1; padding:12px; border-radius:10px; border:none; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.timer-start { background:var(--green); color:#000; }
.timer-stop { background:var(--red); color:var(--white); }
.timer-reset { background:var(--bg2); color:var(--text2); border:1px solid var(--border); }
/* OPERATORI */
.op-card { background:var(--bg3); border-radius:10px; padding:14px; margin-bottom:8px; }
.op-nome { font-size:15px; font-weight:600; color:var(--white); margin-bottom:8px; }
.op-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.op-stat { text-align:center; }
.op-stat-val { font-size:18px; font-weight:700; color:var(--blue); }
.op-stat-lbl { font-size:10px; color:var(--text2); margin-top:2px; }
</style>
</head>
<body>

<div class="header">
  <div><div class="header-title">Officina Rossi</div><div class="header-sub" id="last-sync">Caricamento...</div></div>
  <button class="sync-btn" onclick="syncAll()">↻ Aggiorna</button>
</div>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active">
  <div class="date-label" id="today-label"></div>
  <div class="kpi-grid">
    <div class="kpi-card blue"><div class="kpi-value" id="kpi-ordini">—</div><div class="kpi-label">Ordini totali</div></div>
    <div class="kpi-card green"><div class="kpi-value" id="kpi-completi">—</div><div class="kpi-label">Completati</div></div>
    <div class="kpi-card red"><div class="kpi-value" id="kpi-ritardo">—</div><div class="kpi-label">In ritardo</div></div>
    <div class="kpi-card orange"><div class="kpi-value" id="kpi-oggi">—</div><div class="kpi-label">Pezzi oggi</div></div>
  </div>
  <div class="card"><div class="card-title">Ordini in corso</div><div id="dash-ordini"><div class="loading-state"><div class="spinner"></div></div></div></div>
  <div class="card"><div class="card-title">Produzione recente</div><div id="dash-prod"><div class="loading-state"><div class="spinner"></div></div></div></div>
</div>

<!-- ORDINI -->
<div id="page-ordini" class="page">
  <div class="section-header"><div class="section-title">Tutti gli ordini</div><button class="add-btn" onclick="openModal('modal-ordine')">+ Nuovo</button></div>
  <div id="alert-ordini"></div>
  <div id="ordini-list"><div class="loading-state"><div class="spinner"></div></div></div>
</div>

<!-- PRODUZIONE -->
<div id="page-produzione" class="page">
  <div class="section-header"><div class="section-title">Inserisci produzione</div></div>
  <div id="alert-produzione"></div>

  <!-- TIMER -->
  <div class="timer-box">
    <div class="timer-label">Timer sessione di lavoro</div>
    <div class="timer-display" id="timer-display">00:00:00</div>
    <div class="timer-btns">
      <button class="timer-btn timer-start" id="btn-start" onclick="timerStart()">▶ Start</button>
      <button class="timer-btn timer-stop" id="btn-stop" onclick="timerStop()" style="display:none">⏹ Stop</button>
      <button class="timer-btn timer-reset" onclick="timerReset()">↺ Reset</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Nuova produzione</div>
    <div id="alert-prod-form"></div>
    <div class="form-group">
      <label class="form-label">Operatore *</label>
      <select class="form-select" id="prod-operatore">
        <option value="">Seleziona...</option>
        <option>Halim</option><option>Roberto</option><option>Roberta</option>
        <option>Jason</option><option>Giuliano</option>
        <option>Operatore 7</option><option>Operatore 8</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Ordine *</label>
      <select class="form-select" id="prod-ordine" onchange="caricaFasiProd()">
        <option value="">Seleziona ordine...</option>
      </select>
    </div>
    <div class="form-group" id="gruppo-fase" style="display:none">
      <label class="form-label">Fase *</label>
      <select class="form-select" id="prod-fase" onchange="aggiornaPezziMax()">
        <option value="">Seleziona fase...</option>
      </select>
    </div>
    <div class="form-group" id="gruppo-pezzi" style="display:none">
      <label class="form-label">Pezzi prodotti * <span id="max-pezzi-label" style="color:var(--orange);font-size:11px"></span></label>
      <input class="form-input" id="prod-pezzi" type="number" placeholder="Es. 12" min="1">
    </div>
    <div class="form-group">
      <label class="form-label">Ore impiegate * <span style="color:var(--text2);font-size:11px">(usa il timer sopra)</span></label>
      <input class="form-input" id="prod-ore" type="number" step="0.25" placeholder="Es. 2.5" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">Note</label>
      <input class="form-input" id="prod-note" type="text" placeholder="Opzionale">
    </div>
    <button class="btn btn-success" onclick="submitProduzione()">💾 Salva produzione</button>
  </div>

  <div class="card">
    <div class="card-title">Ultime produzioni</div>
    <div id="produzione-list"><div class="loading-state"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- OPERATORI -->
<div id="page-operatori" class="page">
  <div class="section-title" style="margin-bottom:14px">Statistiche operatori</div>
  <div id="operatori-list"><div class="loading-state"><div class="spinner"></div></div></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="goTo('dashboard')"><span class="nav-icon">📊</span>Dashboard</button>
  <button class="nav-btn" id="nav-ordini" onclick="goTo('ordini')"><span class="nav-icon">📋</span>Ordini</button>
  <button class="nav-btn" id="nav-produzione" onclick="goTo('produzione')"><span class="nav-icon">⚙️</span>Produzione</button>
  <button class="nav-btn" id="nav-operatori" onclick="goTo('operatori')"><span class="nav-icon">👷</span>Operatori</button>
</div>

<!-- MODAL NUOVO ORDINE -->
<div class="modal-overlay" id="modal-ordine">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuovo Ordine</div>
    <div id="alert-modal-ordine"></div>
    <div class="form-group"><label class="form-label">Cliente *</label><input class="form-input" id="ord-cliente" placeholder="Es. Cliente A" type="text"></div>
    <div class="form-group"><label class="form-label">Riferimento pezzo *</label><input class="form-input" id="ord-rif" placeholder="Es. REF-001" type="text"></div>
    <div class="form-group"><label class="form-label">Quantità totale *</label><input class="form-input" id="ord-qty" placeholder="Es. 470" type="number"></div>
    <div class="form-group"><label class="form-label">Data ordine</label><input class="form-input" id="ord-data" type="date"></div>
    <div class="form-group"><label class="form-label">Data consegna promessa</label><input class="form-input" id="ord-consegna" type="date"></div>

    <!-- FASI -->
    <div class="form-group">
      <label class="form-label">Fasi di lavorazione * (max 5)</label>
      <div id="fasi-container"></div>
      <button class="btn-add-fase" id="btn-add-fase" onclick="addFaseForm()">+ Aggiungi fase</button>
    </div>

    <div class="form-group"><label class="form-label">Note</label><input class="form-input" id="ord-note" placeholder="Opzionale" type="text"></div>
    <button class="btn btn-primary" onclick="submitOrdine()">💾 Salva ordine</button>
    <button class="btn btn-outline" onclick="closeModal('modal-ordine')">Annulla</button>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyAFSm3dfl7Y5vodzRljJokL71SYchhlbsIlOtSabx5-feyIvcLCLnZujiadNYOoZUh0g/exec';
const LAVORAZIONI = ['Tornitura','Fresatura','Rettifica','Foratura','Maschiatura','Barenatura','Filettatura','Sbavatura','Controllo qualità','Assemblaggio','Altra'];
let dataOrdini = [], dataProduzione = [], dataOperatori = [];
let fasiCount = 0;

// ── TIMER ──
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;

function timerStart() {
  if (timerRunning) return;
  timerRunning = true;
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'flex';
  timerInterval = setInterval(() => {
    timerSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function timerStop() {
  if (!timerRunning) return;
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('btn-start').style.display = 'flex';
  document.getElementById('btn-stop').style.display = 'none';
  // Aggiorna campo ore automaticamente
  const ore = (timerSeconds / 3600).toFixed(2);
  document.getElementById('prod-ore').value = ore;
}

function timerReset() {
  timerRunning = false;
  clearInterval(timerInterval);
  timerSeconds = 0;
  updateTimerDisplay();
  document.getElementById('btn-start').style.display = 'flex';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('prod-ore').value = '';
}

function updateTimerDisplay() {
  const h = Math.floor(timerSeconds / 3600).toString().padStart(2,'0');
  const m = Math.floor((timerSeconds % 3600) / 60).toString().padStart(2,'0');
  const s = (timerSeconds % 60).toString().padStart(2,'0');
  document.getElementById('timer-display').textContent = h + ':' + m + ':' + s;
}

// ── UTILS ──
const fmt = n => new Intl.NumberFormat('it-IT').format(n||0);
const fmtOre = n => { const v = parseFloat(n)||0; return v.toFixed(1) + 'h'; };
const fmtDate = d => { try { return d ? new Date(d).toLocaleDateString('it-IT') : '—'; } catch(e) { return d||'—'; } };
const today = () => new Date().toISOString().split('T')[0];

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="alert ${type}">${msg}</div>`;
  setTimeout(() => { if(el) el.innerHTML=''; }, 5000);
}

function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
}

function openModal(id) {
  if (id==='modal-ordine') {
    document.getElementById('ord-data').value = today();
    document.getElementById('fasi-container').innerHTML = '';
    fasiCount = 0;
    addFaseForm();
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── API ──
async function apiCall(params) {
  const url = API + '?' + new URLSearchParams(params).toString();
  const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
  const res = await fetch(proxy);
  const data = await res.json();
  return JSON.parse(data.contents);
}

async function syncAll() {
  document.getElementById('last-sync').textContent = 'Aggiornamento...';
  try {
    const [ordini, prod, dash, operatori] = await Promise.all([
      apiCall({action:'getOrdini'}),
      apiCall({action:'getProduzione'}),
      apiCall({action:'getDashboard'}),
      apiCall({action:'getOperatori'})
    ]);
    dataOrdini     = Array.isArray(ordini)    ? ordini    : [];
    dataProduzione = Array.isArray(prod)       ? prod      : [];
    dataOperatori  = Array.isArray(operatori)  ? operatori : [];
    renderDashboard(dash||{});
    renderOrdini();
    renderProduzione();
    renderOperatori();
    popolaSelectOrdini();
    const now = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-sync').textContent = 'Aggiornato alle ' + now;
  } catch(e) {
    document.getElementById('last-sync').textContent = '⚠ Errore connessione';
  }
}

// ── FASI FORM ──
function addFaseForm() {
  if (fasiCount >= 5) return;
  fasiCount++;
  const container = document.getElementById('fasi-container');
  const opts = LAVORAZIONI.map(l => `<option>${l}</option>`).join('');
  const div = document.createElement('div');
  div.className = 'fase-form-row';
  div.id = 'fase-row-' + fasiCount;
  div.innerHTML = `
    <select class="form-input form-select" id="fase-nome-${fasiCount}">${opts}</select>
    <input class="form-input qty" id="fase-qty-${fasiCount}" type="number" placeholder="Qty">
    <button class="btn-remove-fase" onclick="removeFaseForm(${fasiCount})">×</button>`;
  container.appendChild(div);
  if (fasiCount >= 5) document.getElementById('btn-add-fase').style.display = 'none';
}

function removeFaseForm(id) {
  const el = document.getElementById('fase-row-' + id);
  if (el) el.remove();
  fasiCount--;
  document.getElementById('btn-add-fase').style.display = 'block';
}

function getFasiDalForm() {
  const fasi = [];
  document.querySelectorAll('[id^="fase-nome-"]').forEach(el => {
    const idx = el.id.split('-').pop();
    const qty = parseFloat(document.getElementById('fase-qty-'+idx)?.value) || 0;
    if (el.value && qty > 0) fasi.push({ nome: el.value, qty });
  });
  return fasi;
}

// ── SELECT ORDINI (per produzione) ──
function popolaSelectOrdini() {
  const sel = document.getElementById('prod-ordine');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Seleziona ordine...</option>';
  dataOrdini.filter(o => o.Stato !== 'Completato').forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.ID;
    opt.textContent = o.Cliente + ' — ' + o.Rif;
    sel.appendChild(opt);
  });
  if (cur) sel.value = cur;
}

function caricaFasiProd() {
  const ordineId = document.getElementById('prod-ordine').value;
  const gruppoFase = document.getElementById('gruppo-fase');
  const gruppoPezzi = document.getElementById('gruppo-pezzi');
  const selFase = document.getElementById('prod-fase');

  if (!ordineId) { gruppoFase.style.display='none'; gruppoPezzi.style.display='none'; return; }

  const ordine = dataOrdini.find(o => o.ID === ordineId);
  if (!ordine || !ordine.fasi || !ordine.fasi.length) { gruppoFase.style.display='none'; return; }

  selFase.innerHTML = '<option value="">Seleziona fase...</option>';
  ordine.fasi.forEach(f => {
    const rimasti = (parseFloat(f.QtyRichiesta)||0) - (parseFloat(f.QtyProdotta)||0);
    if (rimasti > 0) {
      const opt = document.createElement('option');
      opt.value = f.Fase;
      opt.textContent = f.Fase + ' (' + rimasti + ' pz rimasti)';
      selFase.appendChild(opt);
    }
  });
  gruppoFase.style.display = 'block';
  gruppoPezzi.style.display = 'none';
}

function aggiornaPezziMax() {
  const ordineId = document.getElementById('prod-ordine').value;
  const fase = document.getElementById('prod-fase').value;
  if (!ordineId || !fase) return;
  const ordine = dataOrdini.find(o => o.ID === ordineId);
  if (!ordine) return;
  const faseObj = ordine.fasi.find(f => f.Fase === fase);
  if (!faseObj) return;
  const max = (parseFloat(faseObj.QtyRichiesta)||0) - (parseFloat(faseObj.QtyProdotta)||0);
  document.getElementById('max-pezzi-label').textContent = '(max ' + max + ')';
  document.getElementById('prod-pezzi').max = max;
  document.getElementById('gruppo-pezzi').style.display = 'block';
}

// ── RENDER ──
function ordineCard(o, compact=false) {
  const inRitardo = o.DataConsegna && new Date(o.DataConsegna)<new Date() && o.Stato!=='Completato';
  const bc = o.Stato==='Completato'?'green':inRitardo?'red':'orange';
  const bt = o.Stato==='Completato'?'✓ Completato':inRitardo?'⚠ Ritardo':'● In corso';

  let fasiHtml = '';
  if (o.fasi && o.fasi.length && !compact) {
    fasiHtml = '<div class="fasi-list">' + o.fasi.map(f => {
      const req = parseFloat(f.QtyRichiesta)||0;
      const done = parseFloat(f.QtyProdotta)||0;
      const perc = req>0 ? Math.min((done/req)*100,100) : 0;
      const fc = done>=req ? 'green' : perc>0 ? '' : 'red';
      return `<div class="fase-item">
        <div class="fase-top">
          <span class="fase-nome">${f.Fase}</span>
          <span class="fase-qty">${fmt(done)} / ${fmt(req)} pz</span>
        </div>
        <div class="progress-bar"><div class="progress-fill ${fc}" style="width:${perc}%"></div></div>
      </div>`;
    }).join('') + '</div>';
  }

  return `<div class="ordine-item">
    <div class="ordine-top">
      <div><div class="ordine-cliente">${o.Cliente||'—'}</div><div class="ordine-rif">${o.Rif||'—'} · 📅 ${fmtDate(o.DataConsegna)}</div></div>
      <span class="badge ${bc}">${bt}</span>
    </div>
    ${fasiHtml}
  </div>`;
}

function prodRow(p) {
  return `<div style="background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:13px;font-weight:600;color:var(--white)">${p.Operatore||'—'}</div>
      <div style="font-size:11px;color:var(--text2)">${p.Fase||'—'} · ${p.OrdineRif||p.Rif||'—'} · ${fmtDate(p.Data)}</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:700;color:var(--blue)">${fmt(p.Pezzi)}</div>
      <div style="font-size:10px;color:var(--text2)">${fmtOre(p.OreImpegate)}</div>
    </div>
  </div>`;
}

function renderDashboard(dash) {
  document.getElementById('kpi-ordini').textContent   = dash.totOrdini||0;
  document.getElementById('kpi-completi').textContent = dash.ordiniCompleti||0;
  document.getElementById('kpi-ritardo').textContent  = dash.ordiniInRitardo||0;
  document.getElementById('kpi-oggi').textContent     = fmt(dash.pezziOggi||0);

  const inCorso = dataOrdini.filter(o=>o.Stato!=='Completato').slice(0,3);
  document.getElementById('dash-ordini').innerHTML = inCorso.length
    ? inCorso.map(o=>ordineCard(o,false)).join('')
    : '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Tutti completati!</div></div>';

  const ultimi = [...dataProduzione].reverse().slice(0,4);
  document.getElementById('dash-prod').innerHTML = ultimi.length
    ? ultimi.map(prodRow).join('')
    : '<div class="empty"><div class="empty-icon">⚙️</div><div class="empty-text">Nessuna produzione ancora</div></div>';
}

function renderOrdini() {
  document.getElementById('ordini-list').innerHTML = dataOrdini.length
    ? dataOrdini.map(o=>ordineCard(o,false)).join('')
    : '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nessun ordine. Clicca + Nuovo.</div></div>';
}

function renderProduzione() {
  const ultimi = [...dataProduzione].reverse().slice(0,10);
  document.getElementById('produzione-list').innerHTML = ultimi.length
    ? ultimi.map(prodRow).join('')
    : '<div class="empty"><div class="empty-icon">⚙️</div><div class="empty-text">Nessun inserimento ancora</div></div>';
}

function renderOperatori() {
  const el = document.getElementById('operatori-list');
  if (!dataOperatori.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👷</div><div class="empty-text">Nessun dato ancora</div></div>';
    return;
  }
  el.innerHTML = dataOperatori
    .sort((a,b) => b.pezziTotali - a.pezziTotali)
    .map(op => `<div class="op-card">
      <div class="op-nome">👷 ${op.nome}</div>
      <div class="op-stats">
        <div class="op-stat"><div class="op-stat-val">${fmt(op.pezziTotali)}</div><div class="op-stat-lbl">Pezzi totali</div></div>
        <div class="op-stat"><div class="op-stat-val">${fmtOre(op.oreTotali)}</div><div class="op-stat-lbl">Ore totali</div></div>
        <div class="op-stat"><div class="op-stat-val" style="color:var(--green)">${op.pezziPerOra}</div><div class="op-stat-lbl">Pz/ora</div></div>
      </div>
    </div>`).join('');
}

// ── SUBMIT ORDINE ──
async function submitOrdine() {
  const cliente = document.getElementById('ord-cliente').value.trim();
  const rif     = document.getElementById('ord-rif').value.trim();
  const qty     = document.getElementById('ord-qty').value;
  const fasi    = getFasiDalForm();

  if (!cliente||!rif||!qty) { showAlert('alert-modal-ordine','⚠ Compila Cliente, Riferimento e Quantità','error'); return; }
  if (!fasi.length) { showAlert('alert-modal-ordine','⚠ Aggiungi almeno una fase di lavorazione','error'); return; }

  const qtyTotale = parseFloat(qty);
  const qtyFasi   = fasi.reduce((s,f)=>s+f.qty,0);
  if (qtyFasi !== qtyTotale) {
    showAlert('alert-modal-ordine',`⚠ La somma delle fasi (${qtyFasi}) deve essere uguale alla quantità totale (${qtyTotale})`,'error');
    return;
  }

  try {
    const res = await apiCall({
      action:'addOrdine', cliente, rif, qtyTotale:qty,
      dataOrdine:document.getElementById('ord-data').value,
      dataConsegna:document.getElementById('ord-consegna').value,
      note:document.getElementById('ord-note').value,
      fasi:JSON.stringify(fasi)
    });
    if (res.success) {
      closeModal('modal-ordine');
      await syncAll();
      showAlert('alert-ordini','✓ Ordine salvato con le fasi!','success');
      goTo('ordini');
    } else { showAlert('alert-modal-ordine','❌ '+(res.error||'Errore'),'error'); }
  } catch(e) { showAlert('alert-modal-ordine','❌ Errore connessione','error'); }
}

// ── SUBMIT PRODUZIONE ──
async function submitProduzione() {
  const operatore = document.getElementById('prod-operatore').value;
  const ordineId  = document.getElementById('prod-ordine').value;
  const fase      = document.getElementById('prod-fase').value;
  const pezzi     = document.getElementById('prod-pezzi').value;
  const ore       = document.getElementById('prod-ore').value;

  if (!operatore||!ordineId||!fase||!pezzi||!ore) {
    showAlert('alert-prod-form','⚠ Compila tutti i campi obbligatori','error'); return;
  }

  const ordine = dataOrdini.find(o=>o.ID===ordineId);
  const rif    = ordine ? ordine.Rif : '';

  try {
    const res = await apiCall({
      action:'addProduzione', operatore, ordineId, rif, fase,
      pezzi, ore, data:today(),
      note:document.getElementById('prod-note').value
    });

    if (res.success) {
      // Reset form
      document.getElementById('prod-operatore').value = '';
      document.getElementById('prod-ordine').value = '';
      document.getElementById('prod-fase').value = '';
      document.getElementById('prod-pezzi').value = '';
      document.getElementById('prod-note').value = '';
      document.getElementById('gruppo-fase').style.display='none';
      document.getElementById('gruppo-pezzi').style.display='none';
      timerReset();
      await syncAll();
      let msg = '✓ Produzione salvata!';
      if (res.tutteComplete) msg = '🎉 Ordine completato! Tutte le fasi finite.';
      else if (res.qtyRimasta === 0) msg = '✓ Fase completata!';
      else msg += ' Rimangono ' + res.qtyRimasta + ' pezzi per questa fase.';
      showAlert('alert-prod-form', msg, 'success');
    } else {
      showAlert('alert-prod-form','❌ '+(res.error||'Errore'),'error');
    }
  } catch(e) { showAlert('alert-prod-form','❌ Errore connessione','error'); }
}

// ── INIT ──
document.getElementById('today-label').textContent = new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
syncAll();
setInterval(syncAll, 60000);
</script>
